# =========================================================================
# NHPMBR — Local development stack
#
# Brings up everything needed to run the platform on a developer laptop:
#   - PostgreSQL 16 (+ PostGIS, pg_trgm, pgvector, pgcrypto)
#   - Redis 7
#   - MinIO (S3-compatible object storage)
#   - Keycloak 24 (OIDC identity provider)
#   - The FastAPI backend
#
# The Next.js web app is run on the host (faster HMR) via `make web-dev`.
# =========================================================================

name: nhpmbr-dev

x-defaults: &defaults
  restart: unless-stopped
  networks: [nhpmbr]

networks:
  nhpmbr:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  minio-data:
  keycloak-data:

services:
  # ---------------------------------------------------------------------
  postgres:
    <<: *defaults
    image: postgis/postgis:16-3.4
    container_name: nhpmbr-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nhpmbr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nhpmbr_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-nhpmbr}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=200
      - -c
      - log_min_duration_statement=500
    ports:
      - "55432:5432"   # host port remapped to avoid clash with a local Postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nhpmbr} -d ${POSTGRES_DB:-nhpmbr}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---------------------------------------------------------------------
  redis:
    <<: *defaults
    image: redis:7-alpine
    container_name: nhpmbr-redis
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  # ---------------------------------------------------------------------
  minio:
    <<: *defaults
    image: minio/minio:latest
    container_name: nhpmbr-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-nhpmbr_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-nhpmbr_minio_dev_password_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio-mc:
    <<: *defaults
    image: minio/mc:latest
    container_name: nhpmbr-minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-nhpmbr_minio} ${S3_SECRET_KEY:-nhpmbr_minio_dev_password_change_me} &&
      mc mb -p local/${S3_BUCKET:-nhpmbr-dev} || true &&
      mc anonymous set download local/${S3_BUCKET:-nhpmbr-dev} || true &&
      echo 'MinIO bootstrap complete';
      "
    restart: "no"

  # ---------------------------------------------------------------------
  keycloak:
    <<: *defaults
    image: quay.io/keycloak/keycloak:24.0
    container_name: nhpmbr-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      # Allow OIDC discovery over http://localhost:8080 (defaults require HTTPS → Auth.js “Configuration”).
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker/keycloak:/opt/keycloak/data/import:ro

  # ---------------------------------------------------------------------
  # Keycloak does not reliably import plaintext passwords from realm JSON.
  # This one-shot sets NHPMBR_DEV_USER / NHPMBR_DEV_PASSWORD via Admin API.
  keycloak-bootstrap:
    <<: *defaults
    image: alpine:3.19
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache curl jq >/dev/null
        exec /bin/sh /scripts/bootstrap-dev-user.sh
    environment:
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      NHPMBR_REALM: nhpmbr
      NHPMBR_DEV_USER: admin@nhpmbr.local
      NHPMBR_DEV_PASSWORD: Admin123!Change
    volumes:
      - ./docker/keycloak/bootstrap-dev-user.sh:/scripts/bootstrap-dev-user.sh:ro
    depends_on:
      keycloak:
        condition: service_started
    restart: "no"

  # ---------------------------------------------------------------------
  api:
    <<: *defaults
    build:
      context: ../services/api
      dockerfile: Dockerfile
      target: dev
    container_name: nhpmbr-api
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      OIDC_ISSUER: http://keycloak:8080/realms/nhpmbr
      OIDC_JWKS_URL: http://keycloak:8080/realms/nhpmbr/protocol/openid-connect/certs
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
