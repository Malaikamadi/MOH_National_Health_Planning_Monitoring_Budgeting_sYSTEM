name: CI · API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - '.github/workflows/ci-api.yml'

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: nhpmbr
          POSTGRES_PASSWORD: nhpmbr_test
          POSTGRES_DB: nhpmbr_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nhpmbr -d nhpmbr_test"
          --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://nhpmbr:nhpmbr_test@localhost:5432/nhpmbr_test
      SYNC_DATABASE_URL: postgresql+psycopg://nhpmbr:nhpmbr_test@localhost:5432/nhpmbr_test
      REDIS_URL: redis://localhost:6379/0

    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv==0.4.20

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Bootstrap extensions
        run: |
          PGPASSWORD=nhpmbr_test psql -h localhost -U nhpmbr -d nhpmbr_test \
            -f ../../infra/docker/postgres/init/00-extensions.sql

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app
        continue-on-error: true  # promote to required once codebase is fully typed

      - name: Module boundary check (import-linter)
        run: uv run lint-imports
        continue-on-error: true

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -q --cov=app --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: services/api/coverage.xml

  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build prod image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          target: prod
          push: false
          tags: nhpmbr-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: nhpmbr-api:ci-${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
