name: CI · Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/ci-web.yml'

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-only-secret-not-used-in-real-runs
      KEYCLOAK_CLIENT_ID: ci
      KEYCLOAK_CLIENT_SECRET: ci
      KEYCLOAK_ISSUER: http://localhost:8080/realms/nhpmbr
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @nhpmbr/web typecheck
      - run: pnpm --filter @nhpmbr/web lint
      - run: pnpm --filter @nhpmbr/web build
